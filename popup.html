<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storage Tools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #333;
      text-align: center;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      margin-bottom: 10px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #4a90e2;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: #4a90e2;
      color: white;
    }

    .btn-primary:hover {
      background: #357abd;
    }

    .btn-secondary {
      background: #28a745;
      color: white;
    }

    .btn-secondary:hover {
      background: #218838;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status {
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .cookie-info {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    .cookie-info.show {
      display: block;
    }

    .cookie-item {
      margin-bottom: 5px;
      word-break: break-all;
    }

    .cookie-item strong {
      color: #333;
    }

    .timestamp {
      color: #999;
      font-size: 11px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>localStorage 工具</h1>

    <div class="section">
      <div class="section-title">读取 localStorage</div>
      <div class="input-group">
        <label>源网站:</label>
        <input type="text" id="sourceUrl" value="https://ai-dev.supcon.com/agenthub/home" readonly>
      </div>
      <button class="btn btn-primary" id="readBtn">读取 localStorage</button>
      <div class="status" id="readStatus"></div>
      <div class="cookie-info" id="cookieInfo">
        <div class="section-title">已保存的键值:</div>
        <div id="cookieList"></div>
        <div class="timestamp" id="cookieTimestamp"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">写入 localStorage</div>
      <div class="input-group">
        <label>目标网站域名:</label>
        <input type="text" id="targetDomain" placeholder="例如: example.com 或 https://example.com">
      </div>
      <button class="btn btn-secondary" id="writeBtn">写入 localStorage</button>
      <div class="status" id="writeStatus"></div>
    </div>
  </div>

  <script type="module" src="dist/popup.js"></script>
</body>
</html>
