name: Deploy apps/site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# 设置全局权限
permissions:
  contents: read
  pages: write
  id-token: write

# 取消正在运行的旧任务，避免资源浪费
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 任务 1：构建阶段
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/site
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false # 先不自动安装，由后续步骤处理

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      # 关键步骤：上传构建产物到 GitHub 暂存区
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 注意：指向你 pnpm build 产出的 dist 目录
          path: apps/site/dist

  # 任务 2：部署阶段
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # 只有构建成功才执行部署
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
